<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.15.1/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>

    <script>
    var WORLD_WIDTH = 1950;

    var config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 600 },
                debug: true
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    var square;
    var squareSize = 70;
    var spaceKey;
    var leftKey;
    var rightKey;
    var holdStart = 0;
    var maxHold = 500;
    var isCharging = false;
    var onGround = false;
    var jumpDirection = 1;
    var platform;
    var aimAngle = -90;
    var aimLength = 120;
    var aimGraphics;
    var finishLine;
    var finishReached = false;
    var completionText;
    var resetKey;
    var worldWidth;
    var effectsPool = [];
    var currentChoices = [];
    var choiceUI = null;
    var forceMultiplier = 1.0;
    var appliedEffects = [];
    var levelGraphics = [];
    var levelKeys = ['level1', 'level2', 'level3'];
var currentLevelKey;

    function preload ()
    {
        this.load.image('sky', 'assets/backgrounds/space3.png');
        this.load.image('red', 'assets/particles/red.png');
        this.load.text('level1', 'level1.txt');
        this.load.text('level2', 'level2.txt');
        this.load.text('level3', 'level3.txt');
    }

    function getRandomLevelKey() {
        return levelKeys[Math.floor(Math.random() * levelKeys.length)];
    }

    function makePlatform(scene, x, y, displayWidth, displayHeight) {
        displayWidth = displayWidth || 200;
        displayHeight = displayHeight || 30;

        var p = scene.physics.add.staticImage(x, y, null);
        p.displayWidth = displayWidth;
        p.displayHeight = displayHeight;
        p.setOrigin(0.5, 0.5);

        p.body.setSize(p.displayWidth, p.displayHeight);
        p.body.setOffset(-p.displayWidth / 2 + 15, -39);

        var g = scene.add.graphics();
        g.fillStyle(0x00ff00, 1);
        g.fillRect(p.x - p.displayWidth / 2, p.y - p.displayHeight / 2, p.displayWidth, p.displayHeight);
        levelGraphics.push(g);

        scene.physics.add.collider(square, p, function (squareObj, platformObj) {
            if (squareObj.body.touching.down && platformObj.body.touching.up) {
                square.setVelocity(0, 0);
                onGround = true;
            }
        });

        return p;
    }

    function loadLevel(scene, levelData) {
            if (!levelData) {
                console.error('Missing level data for', currentLevelKey);
                return;
            }

            levelData = levelData.replace(/\r/g, '').trim();
            var lines = levelData.split('\n');

            var tileWidth = window.innerHeight / 8;
            var tileHeight = window.innerHeight / 8;
            var levelWidth = lines[0].length * tileWidth;
            var levelHeight = lines.length * tileHeight;

            scene.cameras.main.setBounds(0, 0, levelWidth, levelHeight);
            scene.physics.world.setBounds(0, 0, levelWidth, levelHeight);

        for (var row = 0; row < lines.length; row++) {
            var line = lines[row].trim();
            for (var col = 0; col < line.length; col++) {
                var char = line[col];
                var x = col * tileWidth + tileWidth / 2;
                var y = row * tileHeight + tileHeight / 2;

                if (char === 'P') {
                    makePlatform(scene, x, y, tileWidth, tileHeight);
                } else if (char === 'F') {
                    finishLine = scene.physics.add.staticImage(x, y, null);
                    finishLine.displayWidth = tileWidth;
                    finishLine.displayHeight = tileHeight;
                    finishLine.setOrigin(0.5, 0.5);
                    finishLine.body.setSize(finishLine.displayWidth, finishLine.displayHeight);
                    finishLine.body.setOffset(-finishLine.displayWidth / 2 + 15, -finishLine.displayHeight / 2 + 15);

                    var fg = scene.add.graphics();
                    fg.fillStyle(0xffffff, 1);
                    fg.fillRect(finishLine.x - finishLine.displayWidth/2, finishLine.y - finishLine.displayHeight/2, finishLine.displayWidth, finishLine.displayHeight);
                    levelGraphics.push(fg);

                    scene.physics.add.overlap(square, finishLine, function (sq, f) {
                        if (!finishReached) {
                            finishReached = true;
                            console.log("Finish reached!");
                            if (square && square.body) {
                                square.setVelocity(0, 0);
                                square.body.enable = false;
                            }
                            showEffectChoices(scene);
                        }
                    }, null, scene);
                }
            }
        }
    }

    function clearLevel(scene) {
        var bodies = scene.physics.world.bodies.entries.slice();
        bodies.forEach(function(body) {
            if (body.gameObject && body.gameObject !== square) {
                body.gameObject.destroy();
            }
        });
        levelGraphics.forEach(function(g) { g.destroy(); });
        levelGraphics = [];
    }

    function sample(array, n) {
        var arr = array.slice();
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
        }
        return arr.slice(0, n);
    }

    function create ()
    {
        effectsPool = [
            {
                id: 'strong_jump',
                name: 'Strong Jump',
                desc: '+50% max jump force',
                apply: function(scene) {
                    forceMultiplier *= 1.5;
                }
            },
            {
                id: 'longer_aim',
                name: 'Longer Aim',
                desc: '+60 aim length',
                apply: function(scene) {
                    aimLength += 60;
                }
            },
            {
                id: 'low_gravity',
                name: 'Low Gravity',
                desc: 'Lower gravity (half)',
                apply: function(scene) {
                    scene.physics.world.gravity.y *= 0.5;
                }
            },
            {
                id: 'fast_charge',
                name: 'Faster Charge',
                desc: 'Charge fills twice as fast',
                apply: function(scene) {
                    maxHold = Math.max(200, maxHold * 0.6);
                }
            }
        ];

        var particles = this.add.particles('red');

        var emitter = particles.createEmitter({
            speed: 75,
            scale: { start: 1, end: 0 },
            blendMode: 'ADD'
        });

        currentLevelKey = getRandomLevelKey();
        var levelData = this.cache.text.get(currentLevelKey);
        var lines = levelData.split('\n');
        var tileWidth = window.innerHeight / 8;
        var tileHeight = window.innerHeight / 8;
        var levelDims = {
            width: lines[0].length * tileWidth,
            height: lines.length * tileHeight
        };

        this.add.tileSprite(0, 0, levelDims.width, levelDims.height, 'sky').setOrigin(0, 0);
        this.cameras.main.setBounds(0, 0, levelDims.width, levelDims.height);
        this.physics.world.setBounds(0, 0, levelDims.width, levelDims.height);

        var squareGraphics = this.add.graphics();
        squareGraphics.fillStyle(0xff0000, 1);
        squareGraphics.fillRect(0, 0, squareSize, squareSize);
        squareGraphics.generateTexture('square', squareSize, squareSize);
        squareGraphics.destroy();
        square = this.physics.add.image(350, 100, 'square');
        square.setCollideWorldBounds(true);
        square.setImmovable(false);
        square.body.setAllowGravity(true);
        square.body.setVelocity(0, 0);

        loadLevel(this, levelData);

        emitter.startFollow(square);

        this.cameras.main.startFollow(square, true, 0.1, 0.1);

        aimGraphics = this.add.graphics();
        aimGraphics.setDepth(1000);

        spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        leftKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT);
        rightKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT);
        resetKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
    }

    function showEffectChoices(scene) {
        if (choiceUI) return;

        currentChoices = sample(effectsPool, 3);

        var overlay = scene.add.rectangle(scene.cameras.main.centerX, scene.cameras.main.centerY, scene.cameras.main.width, scene.cameras.main.height, 0x000000, 0.6);
        overlay.setScrollFactor(0);
        overlay.setDepth(1500);

        var boxW = Math.min(760, scene.cameras.main.width - 80);
        var boxH = 260;
        var boxX = scene.cameras.main.centerX - boxW/2;
        var boxY = scene.cameras.main.centerY - boxH/2;
        var bg = scene.add.rectangle(scene.cameras.main.centerX, scene.cameras.main.centerY, boxW, boxH, 0x222222, 0.95);
        bg.setStrokeStyle(2, 0xffffff, 1);
        bg.setDepth(1501);
        bg.setScrollFactor(0);

        var title = scene.add.text(scene.cameras.main.centerX, boxY + 18, 'Choose One Reward', {
            fontSize: '22px',
            fill: '#ffffff',
            align: 'center'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(1501);

        var buttons = [];
        var startX = scene.cameras.main.centerX - (boxW/2) + 30;
        var gapX = (boxW - 60) / 3;

        currentChoices.forEach(function(choice, idx) {
            var cx = startX + gapX * idx + gapX/2;
            var cy = scene.cameras.main.centerY;

            var btnW = Math.min(220, gapX - 20);
            var btnH = 140;

            var rect = scene.add.rectangle(cx, cy, btnW, btnH, 0x444444, 1).setStrokeStyle(2, 0xffff00, 1).setDepth(1502).setScrollFactor(0);
            rect.setInteractive({ useHandCursor: true });
            var nameText = scene.add.text(cx, cy - 20, choice.name, { fontSize: '16px', fill: '#ffffff', align: 'center', wordWrap: { width: btnW-20 } }).setOrigin(0.5, 0).setDepth(1502).setScrollFactor(0);
            var descText = scene.add.text(cx, cy + 4, choice.desc, { fontSize: '12px', fill: '#dddddd', align: 'center', wordWrap: { width: btnW-20 } }).setOrigin(0.5, 0).setDepth(1502).setScrollFactor(0);

            rect.on('pointerdown', function() {
                applyChoice(choice, scene);
            });

            buttons.push({ rect: rect, nameText: nameText, descText: descText });
        });

        var hint = scene.add.text(scene.cameras.main.centerX, boxY + boxH - 28, 'Pick one of the three rewards to continue', {
            fontSize: '14px',
            fill: '#cccccc',
            align: 'center'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(1501);

        choiceUI = {
            overlay: overlay,
            bg: bg,
            title: title,
            buttons: buttons,
            hint: hint
        };
    }

    function destroyChoiceUI() {
        if (!choiceUI) return;
        choiceUI.overlay.destroy();
        choiceUI.bg.destroy();
        choiceUI.title.destroy();
        choiceUI.hint.destroy();
        choiceUI.buttons.forEach(function(b){ b.rect.destroy(); b.nameText.destroy(); b.descText.destroy(); });
        choiceUI = null;
    }

    function applyChoice(choice, scene) {
        console.log("Applying effect:", choice.id);
        if (choice.apply) {
            choice.apply(scene);
        }
        appliedEffects.push(choice.id);

        destroyChoiceUI();
        clearLevel(scene);

        currentLevelKey = getRandomLevelKey();
        var levelData = scene.cache.text.get(currentLevelKey);
        if (!levelData) {
            console.error('Failed to load level text for', currentLevelKey);
            return;
        }

        loadLevel(scene, levelData);

        if (square && square.body) {
            square.body.enable = true;
            square.setVelocity(0, 0);
            square.x = 350;
            square.y = 100;
        }
        finishReached = false;
        onGround = false;
    }

    function update ()
    {
        if (finishReached && resetKey.isDown) {
            finishReached = false;
            squareSize = 70;
            square.x = 350;
            square.y = 100;
            square.setVelocity(0, 0);
            onGround = false;
            isCharging = false;
            aimAngle = -90;
            forceMultiplier = 1.0;
            maxHold = 500;
            aimLength = 120;
            appliedEffects = [];
            this.physics.world.gravity.y = 600;
            if (completionText) {
                completionText.destroy();
                completionText = null;
            }
            destroyChoiceUI();
            if (square && square.body) {
                square.body.enable = true;
            }
        }

        if (onGround) {
            if (leftKey.isDown) {
                aimAngle -= 1.8;
            }
            if (rightKey.isDown) {
                aimAngle += 1.8;
            }
            aimAngle = Phaser.Math.Clamp(aimAngle, -170, -10);
        }

        aimGraphics.clear();
        if (onGround) {
            aimGraphics.lineStyle(3, 0xffff00, 1);
            var rad = Phaser.Math.DegToRad(aimAngle);
            var sx = square.x;
            var sy = square.y;
            var ex = sx + Math.cos(rad) * aimLength;
            var ey = sy + Math.sin(rad) * aimLength;
            aimGraphics.beginPath();
            aimGraphics.moveTo(sx, sy);
            aimGraphics.lineTo(ex, ey);
            aimGraphics.strokePath();
        }

        if (spaceKey.isDown && !isCharging && onGround) {
            holdStart = this.time.now;
            isCharging = true;
            console.log("Charging...");
        }

        if (square.y + square.height / 2 >= this.physics.world.bounds.bottom) {
            onGround = true;
        }

        if (onGround) {
            square.setVelocity(0, 0);
        }

        if (isCharging && spaceKey.isUp) {
            var holdTime = Phaser.Math.Clamp(this.time.now - holdStart, 0, maxHold);
            var force = Phaser.Math.Linear(100, 600, holdTime / maxHold);
            var rad = Phaser.Math.DegToRad(aimAngle);
            var vx = Math.cos(rad) * force;
            var vy = Math.sin(rad) * force;
            square.setVelocity(vx, vy);
            onGround = false;
            isCharging = false;
        }
    }
    </script>
</body>
</html>
